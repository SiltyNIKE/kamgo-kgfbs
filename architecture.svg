<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="monospace, sans-serif">

  <!-- Background -->
  <rect width="900" height="520" fill="#0f1117"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="bold">KGFBS – Kamgo Facebook Sourcing Architecture</text>

  <!-- ── ROW 1: INPUTS ── -->
  <!-- Kamgo Subjects API -->
  <rect x="40" y="70" width="180" height="60" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="130" y="96" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="bold">Kamgo Subjects API</text>
  <text x="130" y="114" text-anchor="middle" fill="#64748b" font-size="10">~4 000 FB page IDs</text>

  <!-- KG Categories -->
  <rect x="260" y="70" width="180" height="60" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="350" y="96" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="bold">KG Categories Tree</text>
  <text x="350" y="114" text-anchor="middle" fill="#64748b" font-size="10">Pre deti, Hudba, Šport…</text>

  <!-- ── SCRAPING LAYER ── -->
  <rect x="30" y="185" width="380" height="110" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="220" y="203" text-anchor="middle" fill="#475569" font-size="10">SCRAPING LAYER</text>

  <!-- Apify -->
  <rect x="50" y="210" width="150" height="70" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="125" y="232" text-anchor="middle" fill="#86efac" font-size="11" font-weight="bold">Apify Scraper</text>
  <text x="125" y="250" text-anchor="middle" fill="#64748b" font-size="9">recommended</text>
  <text x="125" y="265" text-anchor="middle" fill="#64748b" font-size="9">~$50-100/mes</text>

  <!-- Playwright -->
  <rect x="220" y="210" width="150" height="70" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="295" y="232" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="bold">Playwright</text>
  <text x="295" y="250" text-anchor="middle" fill="#64748b" font-size="9">alternative</text>
  <text x="295" y="265" text-anchor="middle" fill="#64748b" font-size="9">+ rotating proxies</text>

  <!-- ── MAPPER ── -->
  <rect x="480" y="185" width="160" height="110" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="560" y="210" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">mapper.py</text>
  <text x="560" y="228" text-anchor="middle" fill="#64748b" font-size="9">FB raw → Kamgo schema</text>
  <text x="560" y="246" text-anchor="middle" fill="#64748b" font-size="9">GPS coords detection</text>
  <text x="560" y="264" text-anchor="middle" fill="#64748b" font-size="9">prepare_for_api()</text>
  <text x="560" y="282" text-anchor="middle" fill="#64748b" font-size="9">datetime normalization</text>

  <!-- ── AI CATEGORIZER ── -->
  <rect x="480" y="330" width="160" height="90" rx="8" fill="#1e293b" stroke="#ec4899" stroke-width="1.5"/>
  <text x="560" y="355" text-anchor="middle" fill="#f9a8d4" font-size="11" font-weight="bold">categorizer.py</text>
  <text x="560" y="373" text-anchor="middle" fill="#64748b" font-size="9">FB tags → quick match</text>
  <text x="560" y="391" text-anchor="middle" fill="#64748b" font-size="9">Claude Haiku via</text>
  <text x="560" y="409" text-anchor="middle" fill="#64748b" font-size="9">OpenRouter (fallback)</text>

  <!-- ── DEDUP / DB ── -->
  <rect x="200" y="355" width="200" height="90" rx="8" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="300" y="378" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="bold">dedup.py + SQLite</text>
  <text x="300" y="396" text-anchor="middle" fill="#64748b" font-size="9">is_duplicate() check</text>
  <text x="300" y="414" text-anchor="middle" fill="#64748b" font-size="9">POST new / PUT changed</text>
  <text x="300" y="432" text-anchor="middle" fill="#64748b" font-size="9">review_queue table</text>

  <!-- ── HUMAN REVIEW ── -->
  <rect x="40" y="355" width="140" height="90" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="1.5"/>
  <text x="110" y="378" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="bold">Human Review</text>
  <text x="110" y="396" text-anchor="middle" fill="#64748b" font-size="9">AI category check</text>
  <text x="110" y="414" text-anchor="middle" fill="#64748b" font-size="9">time change verify</text>
  <text x="110" y="432" text-anchor="middle" fill="#64748b" font-size="9">few-shot feedback</text>

  <!-- ── KAMGO API ── -->
  <rect x="710" y="255" width="160" height="80" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="790" y="285" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="bold">Kamgo API</text>
  <text x="790" y="305" text-anchor="middle" fill="#64748b" font-size="9">POST new events</text>
  <text x="790" y="320" text-anchor="middle" fill="#64748b" font-size="9">PUT updated events</text>

  <!-- ── ARROWS ── -->

  <!-- Subjects API → Scraper -->
  <line x1="130" y1="130" x2="130" y2="185" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Categories → Categorizer (dashed) -->
  <line x1="350" y1="130" x2="560" y2="330" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-blue)"/>

  <!-- Scraper → Mapper -->
  <line x1="410" y1="240" x2="480" y2="240" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Mapper → Categorizer -->
  <line x1="560" y1="295" x2="560" y2="330" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Mapper → Dedup -->
  <line x1="480" y1="270" x2="400" y2="375" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Dedup → Human Review -->
  <line x1="200" y1="400" x2="180" y2="400" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- Human Review → Categorizer (feedback loop, dashed) -->
  <path d="M 110 355 Q 110 310 480 375" fill="none" stroke="#f97316" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-orange)"/>

  <!-- Dedup → Kamgo API -->
  <line x1="400" y1="395" x2="710" y2="295" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- ── LEGEND ── -->
  <text x="450" y="488" text-anchor="middle" fill="#334155" font-size="10">── solid: data flow　　- - - dashed: config / feedback loop</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f97316"/>
    </marker>
  </defs>

</svg>
